name = "github-readme-stats"
main = "worker/cf-worker-entry.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Alias axios to our fetch-based shim (CF Workers has no Node HTTP internals)
[alias]
"axios" = "./worker/axios-shim.js"

[vars]
# Optional: override cache duration (seconds) for all cards.
# CACHE_SECONDS = "1800"

# Optional: restrict to specific GitHub usernames (comma-separated).
# WHITELIST = "user1,user2"

# Optional: restrict gist card to specific gist IDs (comma-separated).
# GIST_WHITELIST = "gistid1,gistid2"

# Optional: globally exclude repositories from language stats (comma-separated).
# EXCLUDE_REPO = "repo1,repo2"

# Secrets (never commit these — set via CLI):
#   wrangler secret put PAT_1
#   wrangler secret put PAT_2   (optional, for token rotation)
